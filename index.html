<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.VOGUE - 分享你的穿搭体验</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f8f8f8 0%, #f0f0f0 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo {
            width: 100px;
            margin: 0 auto 15px;
        }
        
        .logo img {
            width: 100%;
            height: auto;
        }
        
        h1 {
            color: #333;
            font-size: 22px;
            margin-bottom: 5px;
            font-weight: 600;
            letter-spacing: 2px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 15px;
        }
        
        .required::after {
            content: " *";
            color: #e74c3c;
        }
        
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .option-btn {
            padding: 10px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            color: #555;
        }
        
        .option-btn:hover {
            border-color: #333;
            color: #333;
        }
        
        .option-btn.selected {
            background: #333;
            color: white;
            border-color: #333;
        }
        
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }
        
        textarea:focus {
            outline: none;
            border-color: #333;
        }
        
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .upload-area:hover {
            border-color: #333;
            background: #f8f8f8;
        }
        
        .upload-area .icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .quick-generate-section {
            background: linear-gradient(135deg, #f8f8f8 0%, #f0f0f0 100%);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            text-align: center;
            border: 2px dashed #ccc;
        }
        
        .quick-generate-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .quick-generate-desc {
            font-size: 13px;
            color: #666;
            margin-bottom: 15px;
        }
        
        .quick-generate-btn {
            background: linear-gradient(135deg, #333 0%, #555 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .quick-generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 30px 0;
            color: #999;
            font-size: 13px;
        }
        
        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }
        
        .divider span {
            padding: 0 15px;
        }
        
        .generate-btn {
            width: 100%;
            padding: 16px;
            background: #333;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }
        
        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        
        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .preview-image {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 10px;
        }
        
        .hidden {
            display: none;
        }
        
        .template-selector {
            background: #f8f8f8;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .template-selector label {
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .template-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .template-btn {
            padding: 8px 14px;
            border: 1px solid #ddd;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .template-btn:hover,
        .template-btn.selected {
            background: #333;
            color: white;
            border-color: #333;
        }
        
        /* AI 生成按钮样式 */
        .textarea-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .ai-generate-btn {
            background: #333;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        
        .ai-generate-btn:hover {
            background: #555;
            transform: translateY(-1px);
        }
        
        .ai-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .ai-popup.show {
            display: flex;
        }
        
        .ai-popup-content {
            background: white;
            border-radius: 20px;
            padding: 25px;
            max-width: 90%;
            width: 400px;
            text-align: center;
        }
        
        .ai-popup-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .ai-popup-desc {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }
        
        .ai-template-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .ai-template-btn {
            padding: 10px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            background: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .ai-template-btn:hover,
        .ai-template-btn.selected {
            background: #333;
            color: white;
            border-color: #333;
        }
        
        .ai-popup-close {
            background: #f0f0f0;
            color: #333;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <svg viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
                    <text x="10" y="45" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#333">J.</text>
                    <path d="M 50 45 L 70 15 L 90 45" stroke="#333" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    <text x="95" y="45" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#333">OGUE</text>
                </svg>
            </div>
            <h1>J.VOGUE</h1>
            <p class="subtitle">分享你的穿搭体验</p>
        </div>
        
        <form id="reviewForm">
            <!-- 购买产品类型 -->
            <div class="form-group">
                <label class="required">你购买了什么类型的服饰？</label>
                <div class="options" id="productTypes">
                    <button type="button" class="option-btn" data-value="上衣">👕 上衣</button>
                    <button type="button" class="option-btn" data-value="裤装">👖 裤装</button>
                    <button type="button" class="option-btn" data-value="裙装">👗 裙装</button>
                    <button type="button" class="option-btn" data-value="外套">🧥 外套</button>
                    <button type="button" class="option-btn" data-value="配饰">👜 配饰</button>
                    <button type="button" class="option-btn" data-value="鞋履">👟 鞋履</button>
                </div>
                <input type="hidden" id="selectedProducts" name="products" required>
            </div>
            
            <!-- 最满意的地方 -->
            <div class="form-group">
                <label class="required">最让你满意的是什么？</label>
                <div class="options" id="highlights">
                    <button type="button" class="option-btn" data-value="版型合身">✂️ 版型合身</button>
                    <button type="button" class="option-btn" data-value="面料舒适">🧵 面料舒适</button>
                    <button type="button" class="option-btn" data-value="设计独特">🎨 设计独特</button>
                    <button type="button" class="option-btn" data-value="性价比高">💰 性价比高</button>
                    <button type="button" class="option-btn" data-value="百搭实穿">🔄 百搭实穿</button>
                    <button type="button" class="option-btn" data-value="服务周到">💁 服务周到</button>
                </div>
                <input type="hidden" id="selectedHighlight" name="highlight" required>
            </div>
            
            <!-- 发现渠道 -->
            <div class="form-group">
                <label class="required">你是怎么知道 J.VOGUE 的？</label>
                <div class="options" id="channels">
                    <button type="button" class="option-btn" data-value="小红书">📕 小红书</button>
                    <button type="button" class="option-btn" data-value="朋友推荐">👥 朋友推荐</button>
                    <button type="button" class="option-btn" data-value="路过门店">🚶 路过门店</button>
                    <button type="button" class="option-btn" data-value="Instagram">📷 Instagram</button>
                    <button type="button" class="option-btn" data-value="Facebook">📘 Facebook</button>
                </div>
                <input type="hidden" id="selectedChannel" name="channel" required>
            </div>
            
            <!-- 穿搭感受 -->
            <div class="form-group">
                <div class="textarea-header">
                    <label class="required">分享你的穿搭体验</label>
                    <button type="button" class="ai-generate-btn" id="aiGenerateBtn">
                        ✨ AI 生成
                    </button>
                </div>
                <textarea id="experience" name="experience" placeholder="穿起来感觉如何？搭配什么衣服？适合什么场合？" required></textarea>
            </div>
            
            <!-- 附加感受 -->
            <div class="form-group">
                <label>还有什么想补充的吗？（可选）</label>
                <textarea id="mood" name="mood" placeholder="购物体验、售后服务、回购意愿..."></textarea>
            </div>
            
            <!-- 图片上传 -->
            <div class="form-group">
                <label class="required">上传你的穿搭照片</label>
                <div class="upload-area" id="uploadArea">
                    <div class="icon">📸</div>
                    <p>点击上传照片</p>
                    <p style="font-size: 12px; color: #999; margin-top: 8px;">支持 JPG、PNG 格式</p>
                    <input type="file" id="imageInput" accept="image/*" class="hidden">
                </div>
                <img id="previewImage" class="preview-image hidden">
            </div>
            
            <button type="submit" class="generate-btn" id="submitBtn">
                ✨ 生成分享文案
            </button>
        </form>
    </div>
    
    <!-- AI 生成弹窗 -->
    <div class="ai-popup" id="aiPopup">
        <div class="ai-popup-content">
            <div class="ai-popup-title">✨ AI 帮你写文案</div>
            <p class="ai-popup-desc">选择分享风格，AI 自动生成穿搭体验文案</p>
            
            <div class="ai-template-options" id="aiTemplateOptions">
                <button type="button" class="ai-template-btn" data-template="casual">😊 轻松随意</button>
                <button type="button" class="ai-template-btn" data-template="fashion">✨ 时尚种草</button>
                <button type="button" class="ai-template-btn" data-template="detailed">📝 详细测评</button>
                <button type="button" class="ai-template-btn" data-template="lifestyle">💫 生活方式</button>
            </div>
            
            <input type="hidden" id="aiSelectedTemplate">
            
            <button type="button" class="ai-generate-btn" id="confirmAiGenerate" style="width: 100%; justify-content: center;">
                生成文案
            </button>
            <br>
            <button type="button" class="ai-popup-close" id="closeAiPopup">取消</button>
        </div>
    </div>
    
    <script>
        // 选项按钮选择逻辑
        document.querySelectorAll('.options').forEach(group => {
            const buttons = group.querySelectorAll('.option-btn');
            const isMultiSelect = group.id === 'productTypes'; // 产品类型可多选
            const hiddenInput = group.parentElement.querySelector('input[type="hidden"]');
            
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    if (isMultiSelect) {
                        btn.classList.toggle('selected');
                        const selected = group.querySelectorAll('.option-btn.selected');
                        hiddenInput.value = Array.from(selected).map(b => b.dataset.value).join(',');
                    } else {
                        buttons.forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                        hiddenInput.value = btn.dataset.value;
                    }
                });
            });
        });
        
        // 模板选择
        document.querySelectorAll('.template-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.template-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                document.getElementById('selectedTemplate').value = btn.dataset.template;
            });
        });
        
        // AI 生成弹窗逻辑
        const aiPopup = document.getElementById('aiPopup');
        const aiGenerateBtn = document.getElementById('aiGenerateBtn');
        const closeAiPopup = document.getElementById('closeAiPopup');
        const confirmAiGenerate = document.getElementById('confirmAiGenerate');
        let selectedAiTemplate = '';
        
        // 打开弹窗
        aiGenerateBtn.addEventListener('click', () => {
            aiPopup.classList.add('show');
        });
        
        // 关闭弹窗
        closeAiPopup.addEventListener('click', () => {
            aiPopup.classList.remove('show');
            selectedAiTemplate = '';
            document.querySelectorAll('.ai-template-btn').forEach(b => b.classList.remove('selected'));
        });
        
        // 点击遮罩关闭
        aiPopup.addEventListener('click', (e) => {
            if (e.target === aiPopup) {
                aiPopup.classList.remove('show');
            }
        });
        
        // 选择模板
        document.querySelectorAll('.ai-template-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.ai-template-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedAiTemplate = btn.dataset.template;
            });
        });
        
        // 确认生成
        confirmAiGenerate.addEventListener('click', () => {
            if (!selectedAiTemplate) {
                alert('请先选择一个分享风格！');
                return;
            }
            
            // 自动选择默认选项
            autoSelectDefaults();
            
            // 根据模板生成文案
            const generatedText = generateByTemplate(selectedAiTemplate);
            document.getElementById('experience').value = generatedText;
            
            // 关闭弹窗
            aiPopup.classList.remove('show');
            
            // 清空选择
            selectedAiTemplate = '';
            document.querySelectorAll('.ai-template-btn').forEach(b => b.classList.remove('selected'));
        });
        
        // 图片上传预览
        const uploadArea = document.getElementById('uploadArea');
        const imageInput = document.getElementById('imageInput');
        const previewImage = document.getElementById('previewImage');
        
        uploadArea.addEventListener('click', () => imageInput.click());
        
        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewImage.src = e.target.result;
                    previewImage.classList.remove('hidden');
                    uploadArea.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        });
        
        // 自动选择默认选项（如果用户还没选）
        function autoSelectDefaults() {
            // 选择产品类型（上衣）- 只在没有选择时
            if (!document.getElementById('selectedProducts').value) {
                const productBtn = document.querySelector('#productTypes .option-btn[data-value="上衣"]');
                if (productBtn) productBtn.click();
            }
            
            // 选择最满意的地方（版型合身）- 只在没有选择时
            if (!document.getElementById('selectedHighlight').value) {
                const highlightBtn = document.querySelector('#highlights .option-btn[data-value="版型合身"]');
                if (highlightBtn) highlightBtn.click();
            }
            
            // 选择发现渠道（小红书）- 只在没有选择时
            if (!document.getElementById('selectedChannel').value) {
                const channelBtn = document.querySelector('#channels .option-btn[data-value="小红书"]');
                if (channelBtn) channelBtn.click();
            }
        }
        
        // 根据模板生成文案
        function generateByTemplate(template) {
            // 获取用户选择的品类，默认"衣服"
            const products = document.getElementById('selectedProducts').value;
            const productType = products ? products.split(',')[0] : '衣服';
            
            const templates = {
                casual: `在 J.VOGUE 买到一件超满意的${productType}！

版型真的很合身，穿起来特别舒服～随便搭个牛仔裤就很好看，日常出门完全没问题。

价格也很实惠，性价比超高！已经推荐给朋友了 👍`,
                
                fashion: `✨ J.VOGUE 新品必入！

这件${productType}的设计真的太戳我了！剪裁利落又不失温柔，穿上瞬间提升气质。

面料质感很好，细节处理也很到位。无论是通勤还是约会都能轻松驾驭，真的是衣橱必备单品！

#JVogue #时尚穿搭 #OOTD`,
                
                detailed: `【J.VOGUE 购物分享】

🛍️ 购买单品：J.VOGUE ${productType}
👍 满意点：版型合身、面料舒适
💰 价格区间：中等价位，性价比高

【穿着体验】
上身效果比想象中好很多！版型修身但不紧绷，活动起来很自在。面料亲肤透气，穿着非常舒适。

【搭配建议】
可以搭配高腰裤显腿长，或者配半身裙走温柔路线。一件单品多种风格，真的很实穿！

【总结】
会继续回购，期待更多新品～`,
                
                lifestyle: `今日份小确幸 💫

逛街偶然走进 J.VOGUE，结果被这件${productType}圈粉了！

简约的设计刚好是我喜欢的风格，穿上身的那一刻就知道：就是它了。

有时候幸福很简单，一件合身的${productType}，一个好心情，就能让一整天都闪闪发光 ✨

#JVogue #生活美学 #简单的美好`
            };
            
            return templates[template] || templates.casual;
        }
        
        // 压缩图片
        async function compressImage(imageSrc, maxWidth = 800, quality = 0.7) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    // 计算缩放比例
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > maxWidth) {
                        height = (maxWidth / width) * height;
                        width = maxWidth;
                    }
                    
                    // 创建 canvas
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // 转换为 base64
                    const compressed = canvas.toDataURL('image/jpeg', quality);
                    console.log('Compressed size:', compressed.length);
                    resolve(compressed);
                };
                img.src = imageSrc;
            });
        }
        
        // 表单提交
        document.getElementById('reviewForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            console.log('Form submit clicked');
            
            // 获取值
            const products = document.getElementById('selectedProducts').value;
            const highlight = document.getElementById('selectedHighlight').value;
            const channel = document.getElementById('selectedChannel').value;
            const experience = document.getElementById('experience').value;
            const mood = document.getElementById('mood').value;
            let image = previewImage.src;
            
            // 验证
            let missing = [];
            if (!products) missing.push('服饰类型');
            if (!highlight) missing.push('最满意的地方');
            if (!channel) missing.push('发现渠道');
            if (!experience || !experience.trim()) missing.push('穿搭体验');
            if (!image || image === window.location.href || image === '') {
                missing.push('照片（请点击上传）');
            }
            
            if (missing.length > 0) {
                alert('请填写以下项目：\n• ' + missing.join('\n• '));
                return;
            }
            
            // 按钮状态
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '压缩图片中...';
            
            try {
                // 压缩图片
                if (image.length > 1000000) { // 如果大于 1MB，进行压缩
                    console.log('Compressing image...');
                    image = await compressImage(image, 800, 0.7);
                    console.log('Compressed image size:', image.length);
                }
                
                btn.textContent = '保存中...';
                
                // 保存数据
                const formData = {
                    products,
                    highlight,
                    channel,
                    experience: experience.trim(),
                    mood: mood || '',
                    image: image,
                    template: ''
                };
                
                const dataStr = JSON.stringify(formData);
                console.log('Data size:', dataStr.length);
                
                localStorage.setItem('reviewData', dataStr);
                console.log('Saved successfully');
                
                // 跳转
                btn.textContent = '跳转中...';
                window.location.href = 'result.html';
                
            } catch (err) {
                console.error('Error:', err);
                alert('保存失败：' + err.message);
                btn.disabled = false;
                btn.textContent = '✨ 生成分享文案';
            }
        });
    </script>
</body>
</html>
